<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>00:00 - タイマー</title>
    <!-- CSS will be linked here -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="app-container">
        <div class="timer-wrapper">
            
            <!-- LCD Screen -->
            <div class="lcd-screen" id="lcd-container">
                <div class="time-display">
                    <span id="display-minutes" class="lcd-digits">00</span><span class="lcd-unit">分</span><span id="display-seconds" class="lcd-digits">00</span><span class="lcd-unit">秒</span>
                </div>
            </div>

            <!-- Controls (Buttons) -->
            <div class="controls-container">
                <div class="actions">
                    <div class="hint-wrapper">
                        <div class="keyboard-hints">┌─ リセット (Q+W) ─┐</div>
                    </div>
                    <button type="button" id="btn-minute" class="btn btn-time">
                        <span class="btn-text">分</span>
                        <span class="key-hint">Q</span>
                    </button>
                    <button type="button" id="btn-second" class="btn btn-time">
                        <span class="btn-text">秒</span>
                        <span class="key-hint">W</span>
                    </button>
                    <button type="button" id="btn-start" class="btn btn-action btn-primary" disabled>
                        <span class="btn-text">スタート</span>
                        <span class="key-hint">E</span>
                    </button>
                </div>
            </div>
            
        </div>
    </main>

    <!-- JavaScript file -->
    <script src="js/main.js"></script>
</body>
</html>
